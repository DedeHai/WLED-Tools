		html { touch-action: manipulation; }
		body {
			font-family: Verdana, sans-serif;
			font-size: 1rem;
			text-align: center;
			background: #222;
			color: #fff;
			line-height: 200%;
			margin: 0 auto;
			padding: 8px;
			max-width: 900px;
			box-sizing: border-box;
		}
		body.mode-1d { max-width: none; }
		*, *::before, *::after { box-sizing: border-box; }

		button, .btn, input, select {
			background: #333;
			color: #fff;
			font-family: Verdana, sans-serif;
			margin: 2px;
		}
		button, .btn {
			border: 0.3ch solid #333;
			border-radius: 24px;
			font-size: 20px;
			padding: 8px 12px;
			min-width: 48px;
			cursor: pointer;
			transition: all 0.3s ease;
		}
		button:hover, .btn:hover { background: #555; border-color: #555; }
		button:disabled { background: #222; color: #666; cursor: not-allowed; }
		.btn-sml { font-size: 14px; padding: 4px 10px; }
		input, select { border: 0.5ch solid #333; font-size: medium; }
		input[type="number"] { width: 5em; }

		.title {
			font-size: 28px;
			font-weight: bold;
			padding: 12px 0;
			margin-bottom: 12px;
		}
		.title .rb {
			font-size: 32px;
			font-weight: bold;
			background: repeating-linear-gradient(90deg, #ff6b6b 0 6px, #feca57 6px 12px, #48dbfb 12px 18px, #7b47db 18px 24px);
			background-size: 24px 24px;
			-webkit-background-clip: text;
			-webkit-text-fill-color: transparent;
			animation: pixshift 8s steps(15) infinite;
		}
		@keyframes pixshift { to { background-position: 24px 24px; } }

		.matrix-controls {
			display: flex;
			flex-wrap: wrap;
			gap: 8px;
			justify-content: center;
			align-items: center;
		}
		.matrix-controls .size-inputs { display: flex; align-items: center; gap: 6px; }
		.matrix-controls button { margin: 0; padding: 6px 12px; font-size: 16px; min-width: 40px; }

		.main-content { display: flex; flex-direction: column; align-items: center; gap: 16px; }
		.controls-section { display: flex; justify-content: center; align-items: stretch; gap: 12px; padding: 0 4px; }
		#iroPicker { flex-shrink: 1; min-width: 200; }
		.tools-container { display: flex; flex-direction: column; flex-shrink: 1; min-width: 0; }
		.tools { display: grid; grid-template-columns: repeat(2, 1fr); gap: 3px; flex: 1; align-content: start; }
		.tool-btn {
			font-family: 'painter';
			aspect-ratio: 1;
			background: #333;
			border: 2px solid #666;
			border-radius: 14px;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			font-size: 18px;
			padding: 0;
		}
		.tool-btn.selected { background: #08d; color: #fff; border-color: #08d; }

		body.mode-1d .tool-btn.hide-1d,
		body.mode-1d .size-sep,
		body.mode-1d #matrixH { display: none; }

		body.mode-1d .led-count-1d { display: inline !important; }

		.sliders { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 600px; padding: 0 4px; margin: 0 auto 16px; }
		.slider-row { display: flex; align-items: center; gap: 8px; }
		.slider-row .slider { flex: 1; accent-color: #08d; height: 6px; min-width: 60px; }
		.slider-row label { font-size: 13px; white-space: nowrap; min-width: 50px; order: 3; }
		.slider-row .value { font-size: 13px; min-width: 30px; text-align: right; font-weight: bold; color: #08d; order: 2; }

		.canvas-container { width: 100%; max-width: 600px; margin: 0 auto 16px; padding: 0 4px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
		body.mode-1d .canvas-container { max-width: none; }

		.prev-1d-container { width: 100%; display: none; }
		.prev-1d-container.visible { display: block; }
		.prev-1d-label { font-size: 14px; color: #aaa; margin-bottom: 4px; }

		body.mode-1d #prev1DCont {
			position: sticky;
			top: 0;
			z-index: 20;
			background: #222;
		}

		#canvPrev1D {
			border: 2px solid #08d;
			background: #111;
			width: 100%;
			height: 40px;
			touch-action: none;
			image-rendering: pixelated;
		}

		.wrapped-rows-container { width: 100%; display: none; flex-direction: column; gap: 20px; }
		.wrapped-rows-container.visible { display: flex; }
		.row-canvas-wrapper { width: 100%; cursor: pointer; }
		.row-canvas-wrapper canvas {
			border: 1px solid #666;
			background: #111;
			touch-action: none;
			image-rendering: pixelated;
			display: block;
		}

		#canv {
			border: 2px solid #fff;
			background: #111;
			max-width: 100%;
			max-height: 60vh;
			width: auto;
			height: auto;
			touch-action: none;
		}
		#canv.hidden { display: none; }

		.tools-wrapper { display: flex; flex-direction: column; gap: 16px; }
		#status { padding: 6px 16px; border-radius: 20px; background: #a00; font-size: 14px; }

		.upload-section { margin: 20px 0; padding: 0 4px; }
		.filename-input { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; margin-bottom: 12px; }
		.filename-input input[type="text"]{max-width:200px;padding:6px 10px}

		@media (min-aspect-ratio: 4/3) and (min-width: 600px) {
			body:not(.mode-1d) .main-content { flex-direction: row; align-items: flex-start; justify-content: center; gap: 16px; }
			body:not(.mode-1d) .canvas-container { order: 2; margin: 0; max-width: none; flex: 1; min-width: 0; padding: 0; }
			#canv { max-height: 85vh; }
			body:not(.mode-1d) .tools-wrapper { order: 1; width: 300px; flex-shrink: 0; }
			body:not(.mode-1d) .controls-section { flex-direction: row; align-items: center; margin-bottom: 16px; }
			body:not(.mode-1d) .sliders { max-width: none; margin: 0; }
			.tool-btn { font-size: 20px; }
			.tools { row-gap: 4px; column-gap: 8px; }
		}

		@media (pointer: coarse) {
			body.mode-1d .row-canvas-wrapper canvas { height: 40px !important; }
			body.mode-1d #canvPrev1D { height: 50px !important; }
		}

		.anim-section{margin:20px 0;padding:0 4px}
		.anim-row{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap}
		.dim{font-size:13px;}
		.anim-tab{border-radius:20px;padding:6px 18px;font-size:15px;cursor:pointer;background:#333;border:2px solid #555}
		.anim-tab.selected{background:#08d;color:#fff}
		.sm-panel{display:none}
		.sm-panel.visible{display:block}
		.frame-list{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin:8px auto;max-height:400px;overflow-y:auto}
		.frame-item{display:flex;align-items:center;gap:4px;background:#333;border-radius:6px;padding:2px 8px;font-size:12px;color:#ccc;cursor:pointer}
		.frame-item.selected{background:#08d;color:#fff}
		.frame-item.selected span{color:#fff!important}
		.frame-item .del-f{font-size:11px;padding:1px 5px;min-width:unset;margin:0;border-radius:10px}
		#recBtn.recording{background:#a00;color:#fff}
		#animPrv{border:2px solid #08d;background:#111;image-rendering:pixelated;max-width:min(90vw,400px);display:block;margin:8px auto}
	</style>
</head>
<body>
	<div id="toast"></div>
	<div style="position:absolute;top:0px;left:10px;font-size:10px;color:#666;">v1.2</div>
	<div class="title">WLED <span class="rb">PIXEL</span> Paint</div>
	<div class="matrix-controls">
		<h3>Target Segment</h3>
		<select id="seg"><option value="0" data-w="16" data-h="16">Segment 0 (16x16)</option></select>
		<div class="size-inputs">
			<span class="led-count-1d" style="display:none;">LEDs: </span>
			<input type="number" id="matrixW" value="64">
			<span class="size-sep">&times;</span>
			<input type="number" id="matrixH" value="64">
		</div>
		<div>
			<button onclick="togglePreview()" title="Live Preview" id="status">Preview Off</button>
		</div>
	</div>
	<div style="margin-top: 16px; margin-bottom: 16px;">
		<button onclick="openImage()" title="Open Image" class="tool-btn action"><span>&#xf07c;</span></button>
		<input type="file" id="imgFile" accept="image/*" style="display:none">
		<button onclick="clearMatrix()" title="Clear" class="tool-btn"><span>&#xf00d;</span></button>
		<button onclick="undo()" title="Undo" class="tool-btn"><span>&#xe967;</span></button>
		<button onclick="redo()" title="Redo" class="tool-btn"><span style="display: inline-block; transform: scaleX(-1);">&#xe967;</span></button>
	</div>
	<div class="main-content">
		<div class="tools-wrapper">
			<div class="controls-section">
				<div id="iroPicker"></div>
				<div class="tools-container">
					<div class="tools" id="tools"></div>
				</div>
			</div>
			<div class="sliders">
				<div class="slider-row">
					<input type="range" id="sizeSlider" min="1" max="10" step="0.1" value="1" class="slider">
					<span class="value" id="brushSizeLabel">1.0</span>
					<label>Size</label>
				</div>
				<div class="slider-row">
					<input type="range" id="hardnessSlider" min="1" max="100" value="100" class="slider">
					<span class="value" id="brushHardnessLabel">100</span>
					<label>Hard</label>
				</div>
			</div>
		</div>
		<div class="canvas-container">
			<div class="prev-1d-container" id="prev1DCont">
				<div class="prev-1d-label">Full Strip</div>
				<canvas id="canvPrev1D"></canvas>
			</div>
			<div class="prev-1d-label">Detail View</div>
			<div class="wrapped-rows-container" id="wrapRowCont"></div>
			<div class="wrapped-canvas-container">
				<canvas id="canv"></canvas>
				<div style="text-align:center;margin-top:8px;display:none;" id="smControls">
					<button class="btn btn-sml" onclick="addSMFrame()">Add Frame</button>
					<button class="btn btn-sml" id="updBtn" onclick="updateSMFrame()" disabled>Update Frame</button>
					<button class="btn btn-sml" id="insBtn" onclick="insertSMFrame()" disabled>Insert Before</button>
				</div>
				<span id="durWrap" style="display:none">
    			<label>Frame Duration: <input type="number" id="smDur" value="200" min="10" max="9999"> ms</label>
    			<button class="btn btn-sml" id="applyAllBtn" onclick="updateSMFrame(true)"  disabled>Apply to All</button>
				</span>
			</div>
		</div>
	</div>

	<div id="smFrameList" class="frame-list" style="margin:8px auto;display:none;"></div>

	<div class="anim-section" id="animSect">
		<h3>Animation</h3>
		<div class="anim-row" style="margin-bottom:12px">
			<button class="anim-tab" id="smBtn" onclick="toggleSMMode()">Frame By Frame</button>
			<button class="anim-tab" id="recBtn" onclick="toggleRecord()">&#9679; Record</button>
		</div>
		<div class="anim-row dim" style="margin-bottom:8px">
			<span id="recWrap"><label>Record FPS: <input type="number" id="recFps" value="10" min="0.1" max="30"> </label>
			<label><input type="checkbox" id="fixDurCheck" onchange="setPlayAsRec(this.checked)"> Auto Pause</label></span>
		</div>
		<div class="sm-panel" id="smPanel">
			<div class="anim-row" style="margin-bottom:8px">
				<label><input type="checkbox" id="smOnion" onchange="setOnion(this.checked)"> Overlay last frame</label>
			</div>
		</div>

		<div id="animPrvArea" style="display:none;text-align:center;margin-top:14px;">
			<div class="anim-row">
			    <label><input type="checkbox" id="ppCheck" onchange="setPingPong(this.checked)"> Ping-Pong</label>
		    </div>
			<canvas id="animPrv"></canvas>
			<div id="animInfo" class="dim"></div>
			<div id="animClrArea" style="display:none;text-align:center;margin-top:8px;">
			    <button class="btn" onclick="clearAnim()">Clear frames</button>
		    </div>
		</div>

	</div>
	<div class="upload-section" id="uploadSect">
		<div class="upload">
			<div class="filename-input">
				<label for="fn">Name:</label>
				<input type="text" id="fn" placeholder="mypaint" maxlength="20">
			</div>
			<button class="btn" id="savePreset" onclick="savePreset()">Save as Preset</button>
			<button class="btn" id="saveGIF" onclick="saveGIF()">Save as GIF</button>
		</div>
	</div>
	<div style="text-align:center;margin:20px 0">
		<button class="btn" onclick="window.location.href=getURL('/')">Back to Controls</button>
	</div>
	<div style="font-size:12px;color:#666;">by @dedehai</div>
	<script>
		const PIXEL_SIZE = 32, DEFAULT_MATRIX = 64, MIN_MATRIX = 1, MAX_LEDS = 4096, MAX_MATRIX = 128;
		const LED_PX_SIZE = 16, ROW_HEIGHT = 24; // 1D size
		const TOOLS = [
			{name:"Line",    icon: "&#xf068;"},  // minus/draw line f068
			{name:"Rect",    icon: "&#xf096;"},  // square f096
			{name:"Circle",  icon: "&#xf1db;"},  // circle f1db
			{name:"Fill",    icon: "&#xe90b;"},  // fill e90b
			{name:"Rainbow", icon: "🌈"},       // rainbow emoji
			{name:"Brush",   icon: "&#xf1fc;"},  // paintbrush f1fc
			{name:"Smear",   icon: "&#xf25a;"},  // smear hand f25a
		];

		let canv, ctx, canvPrev1D, ctxPrev1D, mW, mH, statusEl, wrapRowCont;
		let w = DEFAULT_MATRIX, h = DEFAULT_MATRIX, matrix = [], segs = [], curSeg = null;
		let painting = false, tool = 5, startPt = null, lastPos = null, preview = null;
		let iroPicker, brushSize = 1, brushHard = 100, hue = 0;
		let undoStack = []; let redoStack = [];
		let ws = null, prvEn = false, maxColInd = null, prvTmr = null;
		let lastSentMtx = [], snapMtx = null;
		let is1D = false, wrapW = 50, rowCanv = [], selRow = 0;
		let offCanv, offCtx;
		let globalBri = null;
		let animFrames = [], animMode = 'rec', isRecording = false, recIntervalId = null, playAsRec = false;
		let animPrvTimer = null, onionEnabled = false, lastAnimBlob = null, pingPong = false;
		let selFrameIdx = -1;
		let is8266 = false;

		const c2h = (r,g,b)=>((r<<16)|(g<<8)|b).toString(16).padStart(6,'0').toUpperCase();

		// load external resources in sequence to avoid 503 errors if heap is low, repeats indefinitely until loaded
		(function loadFiles() {
			const s = document.createElement('script');
			s.src = 'common.js';
			s.onerror = () => setTimeout(loadFiles, 100);
			s.onload = async () => {
				try {
					const r = await fetch(getURL('/json/info'));
					const inf = await r.json();
					is8266 = inf.arch === 'esp8266';
				} catch(e){}
				const resources = ['iro.js'];
				if (!is8266) resources.push('omggif.js'); // omggif is not available on ESP8266
				loadResources(resources, init);
			};
			document.head.appendChild(s);
		})();

		// init function, reads current segments and puts them in the select list
		async function init() {
			getLoc();
			maxColInd = is8266 ? 35 : 85; // maxColInd is the maximum individual color commands that fit in WS buffer (~12 bytes per color, conservative estimate)
			canv = gId("canv"); ctx = canv.getContext("2d");
			canvPrev1D = gId("canvPrev1D"); ctxPrev1D = canvPrev1D.getContext("2d");
			mW = gId("matrixW"); mH = gId("matrixH");
			statusEl = gId("status"); wrapRowCont = gId("wrapRowCont");
			offCanv = cE('canvas'); offCtx = offCanv.getContext('2d');

			// init iro color picker
			iroPicker = new iro.ColorPicker('#iroPicker', {
				width: 168,
				color:"#ff6600",
				wheelAngle: 270,
				wheelDirection: 'clockwise',
				layout: [
					{component: iro.ui.Wheel},
					{component: iro.ui.Slider, options: {sliderType: 'value'}}
				]
			});

			// create tool buttons
			const toolsEl = gId("tools");
			TOOLS.forEach((t,i)=>{
				const btn = cE("button");
				btn.className = "tool-btn" + (i==5?" selected":"") + (i<3?" hide-1d":"");
				btn.innerHTML = t.icon;
				btn.title = t.name;
				btn.onclick = ()=>{
					for (const b of gEBCN('tool-btn')) b.classList.remove("selected");
					btn.classList.add("selected");
					tool = i;
				};
				toolsEl.appendChild(btn);
			});

			// init sliders
			gId("sizeSlider").oninput = e=>{
				brushSize = parseFloat(e.target.value);
				gId("brushSizeLabel").textContent = brushSize.toFixed(1);
			};
			gId("hardnessSlider").oninput = e=>{
				brushHard = +e.target.value;
				gId("brushHardnessLabel").textContent = brushHard;
			};

			// update if selected segment changes
			gId('seg').onchange = async e=>{
				const o = e.target.selectedOptions[0];
				const segId = +e.target.value;
				if (prvEn && curSeg) await reqJson({seg:{id:curSeg.id,frz:false}});
				curSeg = segs.find(s=>s.id===segId)||{id:segId,start:0};
				mW.value = o.dataset.w; mH.value = o.dataset.h;
				updateMatrix();
				if (prvEn) {
					await reqJson({seg:{id:curSeg.id,frz:true}});
					lastSentMtx = new Array(w*h).fill(null);
					await sendDirty();
				}
			};

			mW.onchange = mH.onchange = updateMatrix;

			// canvas events
			canv.addEventListener('pointerdown',e=>startPaint(e,'2d'));
			canv.addEventListener('pointermove',e=>{e.preventDefault();if(painting)paint(e,'2d');});
			canv.addEventListener('pointerleave',()=>{preview=lastPos=null;drawAll();});

			canvPrev1D.addEventListener('pointerdown',e=>startPaint(e,'1d'));
			canvPrev1D.addEventListener('pointermove',e=>{e.preventDefault();if(painting)paint(e,'1d');});
			canvPrev1D.addEventListener('pointerleave',()=>{lastPos=null;drawAll();});

			document.addEventListener('pointerup',endPaint);

			window.addEventListener('resize', ()=>{
				if (!is1D) return;
				clearTimeout(resizeTmr);
				resizeTmr = setTimeout(()=>{
					const oldSel = selRow; createRowCanv(); drawAll();
					if (oldSel < rowCanv.length) selRow = oldSel;
				}, 100);
			});

			// init tooltips
			tooltip();

			const s1 = gId('seg');
			try {
				const r = await fetch(getURL('/json/state')), j = await r.json();
				globalBri = j.bri || 128;
				segs = j.seg || [];
				s1.innerHTML = '';
				if (segs.length) {
					segs.forEach(seg => {
						const {id,n,start,stop,startY,stopY,grp,spc} = seg;
						const g = grp || 1, s = spc || 0;
						const physH = stopY - startY;
						const o = new Option(n || `Segment ${id}`, id);
						o.dataset.w = Math.ceil((stop - start) / (g + s));
						o.dataset.h = physH > 1 ? Math.ceil(physH / (g + s)) : 1;
						o.dataset.segData = JSON.stringify(seg);
						s1.add(o);
					});
				} else {
					const o = new Option('Segment 0', 0);
					o.dataset.w = 16; o.dataset.h = 16;
					o.dataset.segData = JSON.stringify({id:0,start:0,stop:16,len:16,grp:1,spc:0,of:0,on:true,bri:255,bm:0,rev:false});
					s1.add(o);
				}
				const o = s1.options[s1.selectedIndex];
				if (o) { mW.value = o.dataset.w || 16; mH.value = o.dataset.h || 16; updateMatrix(); }
			} catch(e) { console.error(e); }
			updateMatrix();
			togglePreview();
			updButtons();
		}

		function updateMatrix() {
			is1D = +mH.value <= 1;

			if (is1D) {
				w = Math.max(MIN_MATRIX, Math.min(MAX_LEDS, +mW.value));
				h = 1;
				document.body.classList.add('mode-1d');
				mW.disabled = true;
				mH.disabled = true;
				gId('prev1DCont').classList.add('visible');
				for (const e of gEBCN('prev-1d-label')) e.style.display='block';
				wrapRowCont.classList.add('visible');
				canv.classList.add('hidden');
				canvPrev1D.width = w;
				canvPrev1D.height = 1;
				offCanv.width = w;
				offCanv.height = 1;
			} else {
				w = Math.max(MIN_MATRIX, Math.min(MAX_MATRIX, +mW.value));
				h = Math.max(1, Math.min(MAX_MATRIX, +mH.value));
				mW.value = w; mH.value = h;
				document.body.classList.remove('mode-1d');
				mW.disabled = false;
				mH.disabled = false;
				gId('prev1DCont').classList.remove('visible');
				for (const e of gEBCN('prev-1d-label')) e.style.display='none';
				wrapRowCont.classList.remove('visible');
				canv.classList.remove('hidden');
				offCanv.width = w;
				offCanv.height = h;
			}

			canv.width = w * PIXEL_SIZE;
			canv.height = h * PIXEL_SIZE;
			canv.style.aspectRatio = `${w}/${h}`;

			const sz = w * h;
			if (matrix.length != sz) matrix = Array.from({length: sz}, () => ({r:0,g:0,b:0}));
			if (is1D) createRowCanv();
			drawAll();
		}

		// create 1D detail painting rows
		function createRowCanv(){
			wrapRowCont.innerHTML='';
			rowCanv=[];	  const contW=(wrapRowCont.offsetWidth||800)-(('ontouchstart' in window || navigator.maxTouchPoints > 0)?48:0);
			const optW=Math.floor(contW/LED_PX_SIZE);
			wrapW=Math.max(10,Math.min(200,optW));
			const numRows=Math.ceil(mW.value/wrapW);

			for(let ri=0;ri<numRows;ri++){
				const si=ri*wrapW;
				const ei=Math.min(si+wrapW,mW.value);
				const rw=ei-si;

				const wrap=cE('div');
				wrap.className='row-canvas-wrapper';
				wrap.style.position='relative';
				if(ri===0)wrap.classList.add('selected');

				// Add pixel number label
				const label=cE('div');
				label.style.cssText='font-size:10px;color:#999;display:flex;justify-content:space-between;padding:0 2px;position:absolute;top:-24px;left:0;right:0;pointer-events:none;width:'+(rw*LED_PX_SIZE)+'px;';
				label.innerHTML=`<span>${si}</span><span>${ei-1}</span>`;
				wrap.appendChild(label);

				const cv=cE('canvas');
				cv.width=rw*LED_PX_SIZE;
				cv.height=LED_PX_SIZE;
				cv.style.width=(rw*LED_PX_SIZE)+'px';
				cv.style.height=ROW_HEIGHT+'px';
				const c=cv.getContext('2d');
				c.imageSmoothingEnabled=false;

				// paint immediately on pointerdown in any row
				cv.onpointerdown=e=>{
					selRow=ri;
					rowCanv.forEach((r,i)=>r.wrap.classList.toggle('selected',i===ri));
					startPaint(e,'row');
				};
				cv.onpointermove=e=>{e.preventDefault();if(painting&&selRow===ri)paint(e,'row');};
				cv.onpointerleave=()=>{preview=lastPos=null;drawAll();};
				wrap.appendChild(cv);
				wrapRowCont.appendChild(wrap);
				rowCanv.push({canv:cv,ctx:c,si,ei,wrap});
			}
			selRow=0;
		}

		// update detail-rows when window size changes so they always fit
		let resizeTmr;

		// coordinate transfrmations to match different canvas sizes
		function getCoord(e,mode){
			if(mode==='1d'){
				const rect=canvPrev1D.getBoundingClientRect();
				const scX=canvPrev1D.width/rect.width;
				const idx=Math.floor((e.clientX-rect.left)*scX);
				return{idx:Math.max(0,Math.min(mW.value-1,idx))};
			}
			if(mode==='row'){
				const row=rowCanv[selRow];
				const rect=row.canv.getBoundingClientRect();
				const clickX=e.clientX-rect.left;
				const rw=row.ei-row.si;
				const px=Math.floor((clickX/rect.width)*rw);
				return{idx:row.si+Math.max(0,Math.min(rw-1,px))};
			}
			const rect=canv.getBoundingClientRect(),scX=canv.width/rect.width,scY=canv.height/rect.height;
			return{x:Math.floor((e.clientX-rect.left)*scX/PIXEL_SIZE),y:Math.floor((e.clientY-rect.top)*scY/PIXEL_SIZE)};
		}

		function drawAll() {
			if (is1D) {
				offCtx.fillStyle = "#111"; offCtx.fillRect(0,0,w,1);
				for (let i=0;i<w;i++){const c=matrix[i];offCtx.fillStyle=`rgb(${c.r},${c.g},${c.b})`;offCtx.fillRect(i,0,1,1);}
				if(onionEnabled&&animMode==='sm'&&animFrames.length)drawOnion(offCtx,w,1);
				ctxPrev1D.imageSmoothingEnabled=false;
				ctxPrev1D.drawImage(offCanv,0,0,canvPrev1D.width,canvPrev1D.height);
				rowCanv.forEach(r=>{
					const c=r.ctx,cv=r.canv;
					c.imageSmoothingEnabled=false;
					c.drawImage(offCanv,r.si,0,r.ei-r.si,1,0,0,cv.width,cv.height);
					c.strokeStyle='#666'; c.lineWidth=1; c.beginPath();
					for(let i=1;i<(r.ei-r.si);i++){const x=i*LED_PX_SIZE; c.moveTo(x,0); c.lineTo(x,cv.height);}
					c.stroke();
				});
				return;
			}
			offCtx.fillStyle="#111"; offCtx.fillRect(0,0,w,h);
			const imgData=offCtx.createImageData(w,h);
			const data=imgData.data;
			for(let i=0;i<w*h;i++){
				const c=matrix[i];
				const idx=i*4;
				data[idx]=c.r;
				data[idx+1]=c.g;
				data[idx+2]=c.b;
				data[idx+3]=255;
			}
			offCtx.putImageData(imgData,0,0);

			ctx.imageSmoothingEnabled=false; ctx.drawImage(offCanv,0,0,canv.width,canv.height);
			if(preview){
				ctx.strokeStyle='rgba(255,255,255,0.8)';
				ctx.lineWidth=Math.max(1,brushSize*PIXEL_SIZE/4);
				const sx=preview.start.x*PIXEL_SIZE+PIXEL_SIZE/2, sy=preview.start.y*PIXEL_SIZE+PIXEL_SIZE/2;
				const ex=preview.end.x*PIXEL_SIZE+PIXEL_SIZE/2, ey=preview.end.y*PIXEL_SIZE+PIXEL_SIZE/2;
				ctx.beginPath();
				if(preview.tool===0){ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);}
				else if(preview.tool===1){const x1=Math.min(sx,ex),y1=Math.min(sy,ey);ctx.rect(x1,y1,Math.max(sx,ex)-x1,Math.max(sy,ey)-y1);}
				else if(preview.tool===2){ctx.ellipse((sx+ex)/2,(sy+ey)/2,Math.abs(ex-sx)/2,Math.abs(ey-sy)/2,0,0,2*Math.PI);}
				ctx.stroke();
			}
			ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.beginPath();
			for(let i=1;i<w;i++){const px=i*PIXEL_SIZE;ctx.moveTo(px,0);ctx.lineTo(px,canv.height);}
			for(let j=1;j<h;j++){const py=j*PIXEL_SIZE;ctx.moveTo(0,py);ctx.lineTo(canv.width,py);}
			ctx.stroke();
			if(onionEnabled&&animMode==='sm'&&animFrames.length)drawOnion(ctx,w,h);
		}

		function setPx(x,y,col,op=1,draw=true){
			if(x<0||x>=w||y<0||y>=h)return;
			const i=y*w+x,o=matrix[i];
			matrix[i]={r:Math.round((1-op)*o.r+op*col.r),g:Math.round((1-op)*o.g+op*col.g),b:Math.round((1-op)*o.b+op*col.b)};
			if(draw)drawAll();
		}

		function getPx(x,y){
			return matrix[Math.max(0,Math.min(h-1,y))*w+Math.max(0,Math.min(w-1,x))];
		}

		function colorDist(c1,c2){
			const dr=c1.r-c2.r,dg=c1.g-c2.g,db=c1.b-c2.b;
			return Math.sqrt(dr*dr+dg*dg+db*db);
		}

		function saveState(){
			undoStack.push(matrix.map(c=>({r:c.r,g:c.g,b:c.b})));
			if(undoStack.length>50)undoStack.shift(); // fixed undo stack size of 50 to not use excessive RAM on the device
			redoStack = []; // clear redo stack on new action
		}

		function undo(){
			if(undoStack.length){
				redoStack.push(matrix.map(c=>({r:c.r,g:c.g,b:c.b})));
				matrix=undoStack.pop();
				drawAll();
				if(prvEn) sendDirty();
			}
		}

		function redo(){
			if(redoStack.length){
				undoStack.push(matrix.map(c=>({r:c.r,g:c.g,b:c.b})));
				matrix=redoStack.pop();
				drawAll();
				if(prvEn) sendDirty();
			}
		}

		function applyBrush(x,y,col,draw,rainbow){
			if(rainbow){
				let hsv = iro.Color.rgbToHsv(col);
				hue += 1 / brushSize;
				hsv.h = hue;
				col = iro.Color.hsvToRgb(hsv);
			}
			const rad=Math.ceil(brushSize);
			const mult=brushHard*0.01; // 0.01 to 1.0
			if(is1D){
				const idx=y*w+x;
				for(let di=-rad;di<=rad;di++){
					const d=Math.abs(di);
					if(d>brushSize)continue;
					const i=idx+di;
					if(i<0||i>=mW.value)continue;
					const fall=1-d/brushSize;
					const o=matrix[i];
					const op=fall*mult;
					matrix[i]={r:Math.round((1-op)*o.r+op*col.r),g:Math.round((1-op)*o.g+op*col.g),b:Math.round((1-op)*o.b+op*col.b)};
				}
			}else{
				for(let dx=-rad;dx<=rad;dx++){
					for(let dy=-rad;dy<=rad;dy++){
						const d=Math.sqrt(dx*dx+dy*dy);
						if(d>brushSize)continue;
						const fall=1-d/brushSize;
						setPx(x+dx,y+dy,col,fall*mult,false);
					}
				}
			}
			if(draw)drawAll();
		}

		function clearMatrix(){
			matrix=Array.from({length:w*h},()=>({r:0,g:0,b:0}));
			drawAll();
			if(prvEn) sendDirty(); // send full frame update
		}

		// toggle live preview on LEDs
		async function togglePreview(){
			prvEn=!prvEn;
			statusEl.textContent=prvEn?"Preview On":"Preview Off";
			statusEl.style.background=prvEn?"#08d":"#a00";
			if(prvEn){
				const segId=+gId('seg').value;
				curSeg=segs.find(s=>s.id===segId)||{id:segId,start:0};
				reqJson({seg:{id:curSeg.id,frz:true}});
				initWS();
				lastSentMtx=new Array(w*h).fill(null);
				await sendDirty(); // send full frame
			}else{
				reqJson({seg:{id:curSeg.id,frz:false}});
				if(prvTmr)clearTimeout(prvTmr);
				prvTmr=curSeg=null;
			}
		}

		function startPaint(e,mode){
			e.preventDefault();
			painting=true;
			const coord=getCoord(e,mode);
			startPt=lastPos=coord;
			saveState(); // save state for undo
			snapMtx=matrix.map(c=>({r:c.r,g:c.g,b:c.b}));
			paint(e,mode);
			if(prvEn&&!prvTmr)paintCmp(); // start scheduler to monitor pixel changes and send them out
		}

		async function endPaint(){
			const wasPaint=painting;
			if(painting&&preview&&!is1D){
				if(preview.tool===0)applyLine(preview.start.x,preview.start.y,preview.end.x,preview.end.y,iroPicker.color.rgb);
				else if(preview.tool===1)applyRect(preview.start.x,preview.start.y,preview.end.x,preview.end.y,iroPicker.color.rgb);
				else if(preview.tool===2)applyCircle(preview.start.x,preview.start.y,preview.end.x,preview.end.y,iroPicker.color.rgb);
				preview=null;
				drawAll();
			}
			painting=false;
			startPt=lastPos=null;
			if(wasPaint&&prvEn){
				setTimeout(async()=>{
					const diff=[];
					for(let i=0;i<matrix.length;i++){
						const o=snapMtx[i],n=matrix[i];
						if(o.r!==n.r||o.g!==n.g||o.b!==n.b)diff.push({idx:i,hex:c2h(n.r,n.g,n.b)});
					}
					if(diff.length)await sendDirty(diff); // first pass: send diff between now and before painting
				},80); // let the paint dry first ;)
				setTimeout(async()=>{
					await sendDirty(); // second pass: update the full frame in case something went wrong
				},300);
			}
		}

		function paint(e,mode){
			const coord=getCoord(e,mode);
			const col=iroPicker.color.rgb;
			const px=coord.idx!==undefined?coord.idx%w:coord.x;
			const py=coord.idx!==undefined?Math.floor(coord.idx/w):coord.y;
			let rainbow = false;
			switch(tool){
				case 0:
				case 1:
				case 2: // circle,rect,line not available in 1D mode
					if(startPt&&!is1D){preview={tool,start:startPt,end:coord};drawAll();}
					break;
				case 3:
					floodFill(px,py,col);
					break;
				case 4: // rainbow
					rainbow = true;
				 // fall through
				case 5: // brush
					if(lastPos){
						const lx=lastPos.idx!==undefined?lastPos.idx%w:lastPos.x;
						const ly=lastPos.idx!==undefined?Math.floor(lastPos.idx/w):lastPos.y;
						if(lx!==px||ly!==py){
							const dx=px-lx,dy=py-ly,steps=Math.max(1,Math.ceil(Math.sqrt(dx*dx+dy*dy)));
							for(let i=0;i<=steps;i++)applyBrush(Math.round(lx+dx*i/steps),Math.round(ly+dy*i/steps),col,false,rainbow);
							drawAll();
						}else applyBrush(px,py,col,true,rainbow);
					}else applyBrush(px,py,col,true,rainbow);
					lastPos=coord;
					break;
				case 6: // smear
					if(lastPos){
						const lx=lastPos.idx!==undefined?lastPos.idx%w:lastPos.x;
						const ly=lastPos.idx!==undefined?Math.floor(lastPos.idx/w):lastPos.y;
						if(lx!==px||ly!==py){
							const dx=px-lx,dy=py-ly,steps=Math.max(1,Math.ceil(Math.sqrt(dx*dx+dy*dy)));
							const rad=Math.ceil(brushSize);
							for(let i=0;i<=steps;i++){
								const cx=Math.round(lx+dx*i/steps),cy=Math.round(ly+dy*i/steps);
								for(let ddx=-rad;ddx<=rad;ddx++){
									for(let ddy=-rad;ddy<=rad;ddy++){
										const d=Math.sqrt(ddx*ddx+ddy*ddy);
										if(d>brushSize)continue;
										const op=(1-d/brushSize)*(0.3+brushHard/100*0.7);
										setPx(cx+ddx,cy+ddy,getPx(lx+ddx,ly+ddy),op,false);
									}
								}
							}
							drawAll();
						}
					}
					lastPos=coord;
					break;
			}
		}

		function applyLine(x0,y0,x1,y1,col){
			let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0),sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;
			while(true){
				applyBrush(x0,y0,col,false);
				if(x0==x1&&y0==y1)break;
				const e2=2*err;
				if(e2>-dy){err-=dy;x0+=sx;}
				if(e2<dx){err+=dx;y0+=sy;}
			}
			drawAll();
		}

		function floodFill(x,y,col){
			const thresh=(brushSize/10)*25,tgt=getPx(x,y);
			if(colorDist(tgt,col)<thresh)return;
			let vis=new Uint8Array(w*h),stack=[[x,y]];
			while(stack.length){
				let[cx,cy]=stack.pop();
				if(cx<0||cx>=w||cy<0||cy>=h)continue;
				let i=cy*w+cx;
				if(vis[i])continue;
				vis[i]=1;
				if(colorDist(getPx(cx,cy),tgt)>thresh)continue;
				setPx(cx,cy,col,brushHard/100,false);
				stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
			}
			drawAll();
		}

		function applyRect(x0,y0,x1,y1,col){
			let xmin=Math.min(x0,x1),xmax=Math.max(x0,x1),ymin=Math.min(y0,y1),ymax=Math.max(y0,y1);
			for(let x=xmin;x<=xmax;x++){applyBrush(x,ymin,col,false);applyBrush(x,ymax,col,false);}
			for(let y=ymin+1;y<ymax;y++){applyBrush(xmin,y,col,false);applyBrush(xmax,y,col,false);}
			drawAll();
		}

		function applyCircle(x0,y0,x1,y1,col){
			const cx=(x0+x1)/2,cy=(y0+y1)/2,rx=Math.abs(x1-x0)/2,ry=Math.abs(y1-y0)/2;
			const steps=Math.max(300,Math.ceil(2*Math.PI*Math.max(rx,ry)));
			for(let i=0;i<steps;i++){
				const a=(i/steps)*2*Math.PI;
				applyBrush(Math.round(cx+rx*Math.cos(a)),Math.round(cy+ry*Math.sin(a)),col,false);
			}
			drawAll();
		}

		function initWS(){
			ws=connectWs();
			if(!ws)maxColInd=256;
		}

		// send json request over WS or HTTP
		async function reqJson(cmd){
			if(ws&&ws.readyState==1){
				try{ws.send(JSON.stringify(cmd));return 1;}catch(e){}
			}
			if(!window._httpQ){window._httpQ=[];window._httpRun=0;}
			if(_httpQ.length>=5)return -1;
			return new Promise(resolve=>{
				_httpQ.push({cmd,resolve});
				(async function run(){
					if(_httpRun)return;
					_httpRun=1;
					while(_httpQ.length){
						let q=_httpQ.shift();
						try{await fetch(getURL('/json'),{method:'post',body:JSON.stringify(q.cmd),cache:'no-store'});}catch(e){}
						await new Promise(r=>setTimeout(r,120));
						q.resolve(0);
					}
					_httpRun=0;
				})();
			});
		}

		// sends out the pixels contained in the diffList in chunks, sends full frame update when no diffList provided
		async function sendDirty(diffList){
			if(!prvEn||!curSeg)return;
			let interval=20,isRefresh=false;
			if(!diffList){
				diffList=matrix.map((c,i)=>({idx:i,hex:c2h(c.r,c.g,c.b)}));
				interval=40;
				isRefresh=true;
			}
			if(!diffList.length)return;
			diffList.sort((a,b)=>a.idx-b.idx);
			let chunk=[];
			for(let d of diffList){
				if(d.idx>=matrix.length)continue;
				chunk.push(d.idx,d.hex);
				if(chunk.length>=maxColInd*2){
					if(isRefresh&&painting)return;
					if(!prvEn||!curSeg)return;
					await reqJson({seg:{id:curSeg.id,i:chunk}});
					chunk=[];
					await new Promise(r=>setTimeout(r,interval));
				}
			}
			if(chunk.length){
				if(!prvEn||!curSeg)return;
				await reqJson({seg:{id:curSeg.id,i:chunk}});
				await new Promise(r=>setTimeout(r,interval));
			}
			for(let d of diffList){
				if(d.idx<matrix.length)lastSentMtx[d.idx]=d.hex;
			}
		}

		// monitoring loop that checks for changed pixels while painting every 50ms
		function paintCmp(){
			prvTmr=setTimeout(async()=>{
				prvTmr=null;
				const diff=[];
				for(let i=0;i<matrix.length;i++){
					const c=matrix[i];
					const hex=c2h(c.r,c.g,c.b);
					if(lastSentMtx[i]!==hex)diff.push({idx:i,hex});
				}
				if(diff.length)await sendDirty(diff);
				if(painting&&prvEn)paintCmp();
			},50);
		}

		function openImage(){
			const f=gId('imgFile');
			f.value='';
			f.onchange=e=>{
				const a=e.target.files[0];
				if(!a)return;
				const reader=new FileReader();
				reader.onload=ev=>{
					const buf=new Uint8Array(ev.target.result);
					// Check if it's a animated GIF if omggif is available
					if(typeof window.GifReader !== 'undefined' && buf.length>6&&buf[0]===0x47&&buf[1]===0x49&&buf[2]===0x46){
						try{
							const gif=new window.GifReader(buf);
							const nf=gif.numFrames();
							if(nf>1){
								// Animated GIF: load all frames with proper disposal handling
								animFrames=[];
								const gw=gif.width,gh=gif.height;
								// Resize matrix to fit GIF dimensions if needed
								if(gw!==w||gh!==h){
									mW.value=gw;mH.value=gh;
									updateMatrix();
								}
								// Canvas for compositing frames (handles disposal methods)
								const cvs=cE('canvas');
								cvs.width=gw;cvs.height=gh;
								const c=cvs.getContext('2d');
								// Previous canvas for disposal method 3 (restore to previous)
								const prevCvs=cE('canvas');
								prevCvs.width=gw;prevCvs.height=gh;
								const prevCtx=prevCvs.getContext('2d');
								for(let fi=0;fi<nf;fi++){
									const info=gif.frameInfo(fi);
									// Save current state before drawing (for disposal method 3)
									prevCtx.clearRect(0,0,gw,gh);
									prevCtx.drawImage(cvs,0,0);
									// Decode frame onto temp buffer
									const px=new Uint8ClampedArray(gw*gh*4);
									gif.decodeAndBlitFrameRGBA(fi,px);
									// Create temp canvas for this frame
									const tmp=cE('canvas');
									tmp.width=gw;tmp.height=gh;
									const tctx=tmp.getContext('2d');
									const idata=tctx.createImageData(gw,gh);
									idata.data.set(px);
									tctx.putImageData(idata,0,0);
									// Draw frame onto main canvas at proper position
									c.drawImage(tmp,info.x,info.y,info.width,info.height,info.x,info.y,info.width,info.height);
									// Capture full canvas as frame
									const fullPx=c.getImageData(0,0,gw,gh).data;
									const delay=Math.max(10,info.delay*10)||200;
									animFrames.push({pixels:new Uint8ClampedArray(fullPx),delay:delay});
									// Apply disposal method for NEXT frame
									// 0=unspecified, 1=do not dispose, 2=restore to background, 3=restore to previous
									if(info.disposal===2){
										// Restore to background: clear the frame rect
										c.clearRect(info.x,info.y,info.width,info.height);
									}else if(info.disposal===3){
										// Restore to previous: restore canvas to state before this frame
										c.clearRect(0,0,gw,gh);
										c.drawImage(prevCvs,0,0);
									}
									// disposal 0 and 1: leave canvas as-is for next frame
								}
								// Enable stop-motion mode to show frames
								if(animMode!=='sm')toggleSMMode();
								updateSMFrameList();
								showAnimPreview();
								updButtons();
								// Load first frame into editor
								loadSMFrame(0);
								toast(`Loaded ${nf} frames from GIF`);
								return;
							}
						}catch(err){console.error('GIF parse error:',err);}
					}
					// Fallback: load as static image
					const blob=new Blob([buf],{type:a.type});
					const i=new Image();
					i.onload=()=>{
						offCanv.width=i.width;offCanv.height=i.height;
						offCtx.drawImage(i,0,0,i.width,i.height);
						const d=offCtx.getImageData(0,0,i.width,i.height).data;
						if(is1D && (w*h == i.width*i.height || w*h == (i.width*i.height-1))){
							let j=0;
							for(let y=0;y<i.height&&j<matrix.length;y++){
								for(let x=0;x<i.width&&j<matrix.length;x++){
									const p=(y*i.width+x)*4;
									matrix[j++]={r:d[p],g:d[p+1],b:d[p+2]};
								}
							}
							updateMatrix();
						}else{
							offCanv.width=w;offCanv.height=h;
							offCtx.drawImage(i,0,0,w,h);
							const d2=offCtx.getImageData(0,0,w,h).data;
							for(let k=0;k<w*h;k++)matrix[k]={r:d2[k*4],g:d2[k*4+1],b:d2[k*4+2]};
						}
						drawAll();
						if(prvEn)sendDirty();
					};
					i.src=URL.createObjectURL(blob);
				};
				reader.readAsArrayBuffer(a);
			};
			f.click();
		}

		async function savePreset(e, colorReduction = 0) {
			let fn=gId('fn').value.trim()||'mypaint';
			if(colorReduction) fn+='[reduced]';
			if(!fn)return;
			const colors = [];
			const mask = (0xFF >> colorReduction) << colorReduction;
			// build color array with reduced color depth if needed: reduces json size by grouping similar colors
			for(let i = 0; i < w*h; i++){
				colors[i] = c2h(matrix[i].r & mask, matrix[i].g & mask, matrix[i].b & mask);
			}

			// build color array and optimize size using range pattern
			const pattern = [];
			let si=0,cur=colors[0];
			for (let i = 1; i <= colors.length; i++) {
				if(i===colors.length||colors[i]!==cur){
					pattern.push(...(i - si === 1 ? [cur] : [si, i, cur]));
					if (i < colors.length) { si = i; cur = colors[i]; }
				}
			}

			const segData = JSON.parse(gId('seg').selectedOptions[0].dataset.segData || '{}');
			try {
				const presets = await (await fetch(getURL('/presets.json'))).json();
				const nextId = Math.max(...Object.keys(presets).map(k => parseInt(k)).filter(n => !isNaN(n)), 0) + 1;

				const res = await (await fetch(getURL('/json'), {
					method: 'POST',
					body: JSON.stringify({
						on: true, bri: globalBri,
						seg: {
							id: segData.id || 0,
							start: segData.start || 0,
							stop: segData.stop || mW.value,
							len: segData.len || mW.value,
							grp: segData.grp || 1,
							spc: segData.spc || 0,
							of: segData.of || 0, on: true,
							frz: true, bri: segData.bri || 255,
							bm: segData.bm || 0,
							rev: segData.rev || false, i: pattern
						},
						n: fn, o: false, psave: nextId
					})
				})).json();

				if (res.success) toast(`Preset "${fn}" saved as ID ${nextId}`);
				else throw new Error();
			} catch (err) {
				// lets assume the error is due to payload size (it usually is), reduce color depth and try again
				if (colorReduction < 4) {
					toast(`Preset too large, reducing colors`,true);
					return await savePreset(e, colorReduction + 1);
				}
				else toast(`Error: ${err.message}`,true);
			}
		}

		// generate gif palette using median-cut algorithm, palette is padded to power of 2 size (gif standard)
		function genPal(pix){
			const map=new Map();
			for(let i=0;i<pix.length;i+=4){
				const c=(pix[i]<<16)|(pix[i+1]<<8)|pix[i+2];
				map.set(c,(map.get(c)||0)+1);
			}
			let buckets=[Array.from(map,([rgb,count])=>({r:rgb>>16&255,g:rgb>>8&255,b:rgb&255,count}))];
			while(buckets.length<256&&buckets.some(b=>b.length>1)){
				buckets.sort((a,b)=>b.length-a.length);
				const b=buckets.shift();
				const ch=['r','g','b'].map(k=>({k,range:Math.max(...b.map(c=>c[k]))-Math.min(...b.map(c=>c[k]))}))
					.reduce((a,b)=>a.range>b.range?a:b).k;
				b.sort((a,c)=>a[ch]-c[ch]);
				const m=b.length>>1;
				buckets.push(b.slice(0,m),b.slice(m));
			}
			const pal=buckets.map(b=>{
				const t=b.reduce((s,c)=>s+c.count,0);
				const r=Math.round(b.reduce((s,c)=>s+c.r*c.count,0)/t);
				const g=Math.round(b.reduce((s,c)=>s+c.g*c.count,0)/t);
				const bl=Math.round(b.reduce((s,c)=>s+c.b*c.count,0)/t);
				return(r<<16)|(g<<8)|bl;
			});
			let p2=1;
			while(p2<pal.length)p2<<=1;
			for(let i=pal.length;i<p2;i++)pal[i]=pal[pal.length-1];
			const idx=new Uint8Array(pix.length/4);
			for(let i=0,j=0;i<pix.length;i+=4,j++){
				let r=pix[i],g=pix[i+1],b=pix[i+2],best=0,min=1e9;
				for(let k=0;k<buckets.length;k++){
					const p=pal[k],pr=p>>16&255,pg=p>>8&255,pb=p&255;
					const d=(r-pr)**2+(g-pg)**2+(b-pb)**2;
					if(d<min){min=d;best=k;}
				}
				idx[j]=best;
			}
			return{indexed:idx,palette:pal};
		}

		// calculate optimal grid dimensions for 1D pixel data (gif is restricted to 320x320)
		function grid(length) {
			if (length <= 320) return { w: length, h: 1 };
			let best = [1, length], waste = length;
			// find best matching width/height with least wasted pixels (should never be more than 1)
			for (let w = 320; w >= 2; w--) {
				const h = Math.ceil(length / w);
				const wst = w * h - length;
				if (wst < waste) {
					best = [w, h];
					waste = wst;
					if (!waste) break;
				}
			}
			return { w: best[0], h: best[1] };
		}

		// shared: check for existing file, confirm overwrite, then upload blob (used by saveGIF and the animation exporter)
		async function uploadBlob(blob,fn){
			let exists=false;
			try{
				const r=await fetch(getURL('/edit?list=/'));
				if(!r.ok) throw new Error('List fetch failed');
				const data=await r.json();
				if(!Array.isArray(data)) throw new Error('Invalid list response');
				const target = fn.startsWith('/') ? fn : '/' + fn;
				exists=data.some(f=>{
					const n = (f.name !== undefined) ? f.name : f;
					return n === target || n === fn || n === target.toLowerCase() || n === fn.toLowerCase();
				});
			}catch(e){
				console.error('Error fetching file list:',e);
				toast('Could not check existing files, proceeding anyway', true);
			}
			if(exists&&!confirm(`${fn} already exists. Do you want to overwrite it?`))return;
			try{
				const fd=new FormData();
				// WLED /upload expects field name "data", not "file" (matches common.js uploadFile)
				fd.append('data', new File([blob], fn, {type: 'image/gif'}), fn);
				const r=await fetch(getURL('/upload'),{method:'POST',body:fd});
				if(r.ok)toast(`${esc(fn)} saved`);
				else toast('Upload failed',true);
			}catch(e){toast(`Error: ${e.message}`,true);}
		}

		// generate and upload gif
		async function saveGIF() {
			let fn = gId('fn').value.trim()||'mypaint';
			if(!fn.endsWith('.gif')) fn += '.gif';
			try {
				let blob;
				if (animFrames.length > 0) {
					// Animated GIF: use existing build logic
					lastAnimBlob = null; // force rebuild
					blob = getAnimBlob();
					if (!blob) return; // getAnimBlob already toasts error
				} else {
					// Static GIF
					const g = grid(w);
					let gw = g.w, gh = Math.max(g.h, h);
					const pix=new Uint8Array(gw*gh*4);
					for(let i=0;i<gw*gh;i++){
						const c=matrix[i]||matrix[w*h-1];
						pix[i*4]=c.r;pix[i*4+1]=c.g;pix[i*4+2]=c.b;pix[i*4+3]=255;
					}
					const id=new ImageData(new Uint8ClampedArray(pix),gw,gh);
					let{indexed,palette}=genPal(id.data);
					const gifData=[],wr=new window.GifWriter(gifData,gw,gh,{loop:0,palette});
					wr.addFrame(0,0,gw,gh,indexed);
					wr.end();
					blob = new Blob([new Uint8Array(gifData)],{type:'image/gif'});
				}
				await uploadBlob(blob, fn);
			} catch(e) {
				toast(`Error: ${e.message}`,true);
			}
		}

		// ===== ANIMATION =====
		// captures the current painting as a flat RGBA pixel buffer, same layout genPal/GifWriter expect
		function captureMatrix(){
			const p=new Uint8ClampedArray(w*h*4);
			for(let i=0;i<w*h;i++){const c=matrix[i];p[i*4]=c.r;p[i*4+1]=c.g;p[i*4+2]=c.b;p[i*4+3]=255;}
			return p;
		}

		function toggleSMMode(){
			const smOn=animMode!=='sm';
			animMode=smOn?'sm':'rec';
			gId('smBtn').classList.toggle('selected',smOn);
			gId('smPanel').classList.toggle('visible',smOn);
			gId('smControls').style.display=smOn?'':'none';
			gId('smFrameList').style.display=smOn?'':'none';
			gId('durWrap').style.display=smOn?'':'none';
			gId('recWrap').style.display=smOn?'none':'';
			updateSMFrameList();
			if(!smOn){
				gId('smOnion').checked=false;setOnion(false);
			}
			if(isRecording&&smOn)pauseRecord();
		}

		function toggleRecord(){
			if(animMode!=='rec'){animMode='rec';gId('smBtn').classList.remove('selected');gId('smPanel').classList.remove('visible');gId('smControls').style.display='none';gId('smFrameList').style.display='none';gId('durWrap').style.display='none';gId('recWrap').style.display='';}
			isRecording?pauseRecord():resumeRecord();
		}

		// records at a fixed 20fps; identical consecutive frames are merged (delay accumulated) instead of stored, keeping file size down
		function resumeRecord(){
			isRecording=true;
			gId('recBtn').textContent='⏹ Stop';
			gId('recBtn').classList.add('recording');
			if(!animFrames.length){gId('animPrvArea').style.display='none';gId('animClrArea').style.display='none';}
			stopAnimPreview();
			updButtons();
			let lastPix=animFrames.length?new Uint8ClampedArray(animFrames[animFrames.length-1].pixels):null;
			const iv=Math.round(1000/(gId('recFps').value)||25);
			recIntervalId=setInterval(()=>{
				const pix=captureMatrix();
				if(lastPix&&pix.every((v,i)=>v===lastPix[i])){
					if(animFrames.length&&!playAsRec)animFrames[animFrames.length-1].delay+=iv;
				}else{
					animFrames.push({pixels:pix,delay:playAsRec?iv:0});
					if(!playAsRec&&animFrames.length>1)animFrames[animFrames.length-2].delay=Math.max(iv,animFrames[animFrames.length-2].delay);
					lastPix=new Uint8ClampedArray(pix);
				}
			},iv);
		}

		function pauseRecord(){
			clearInterval(recIntervalId);recIntervalId=null;isRecording=false;
			gId('recBtn').textContent='● Record';
			gId('recBtn').classList.remove('recording');
			if(animFrames.length){showAnimPreview();gId('animClrArea').style.display='';}
			updButtons();
		}

		// stop-motion: adds the current painting as one frame, displayed for the given duration
		function addSMFrame(){
			const dur=Math.max(10,parseInt(gId('smDur').value)||200);
			animFrames.push({pixels:captureMatrix(),delay:dur});
			lastAnimBlob=null;selFrameIdx=-1;updateSMFrameList();showAnimPreview();
			gId('updBtn').disabled=true;gId('insBtn').disabled=true;
			updButtons();
		}

		function deleteSMFrame(i){
			animFrames.splice(i,1);lastAnimBlob=null;
			if(selFrameIdx===i){selFrameIdx=-1;gId('updBtn').disabled=true;gId('insBtn').disabled=true;}
			else if(selFrameIdx>i)selFrameIdx--;
			updateSMFrameList();
			if(!animFrames.length){gId('animPrvArea').style.display='none';gId('animClrArea').style.display='none';stopAnimPreview();}
			else showAnimPreview();
			drawAll();
			updButtons();
		}

		function updateSMFrameList(){
			gId('smFrameList').innerHTML=animFrames.map((f,i)=>
				`<div class="frame-item${i===selFrameIdx?' selected':''}" onclick="loadSMFrame(${i})">F${i+1} <span style="color:#08d">${f.delay}ms</span><button class="btn del-f" onclick="event.stopPropagation();deleteSMFrame(${i})">\u2715</button></div>`
			).join('');
		}

		function setOnion(on){onionEnabled=on;drawAll();}
		function setPingPong(on){pingPong=on;if(animFrames.length)showAnimPreview();}
		function setPlayAsRec(on){playAsRec=on;}

		// overlays the last saved stop-motion frame at low opacity so the next frame can be aligned to it
		function drawOnion(targetCtx, tw, th){
			let srcIdx=selFrameIdx>=0?selFrameIdx-1:animFrames.length-1;
			if(srcIdx<0||srcIdx>=animFrames.length)return;
			const prev=animFrames[srcIdx].pixels;
			const tmp=cE('canvas');tmp.width=tw;tmp.height=th;
			tmp.getContext('2d').putImageData(new ImageData(new Uint8ClampedArray(prev),tw,th),0,0);
			targetCtx.save();targetCtx.globalCompositeOperation='lighter';targetCtx.globalAlpha=0.3;targetCtx.imageSmoothingEnabled=false;
			targetCtx.drawImage(tmp,0,0,targetCtx.canvas.width,targetCtx.canvas.height);
			targetCtx.restore();
		}

		// plays back the captured frames in a small preview canvas using each frame's own delay
		function showAnimPreview(){
			if(!animFrames.length)return;
			gId('animPrvArea').style.display='';
			gId('animClrArea').style.display='';
			const g=grid(w),gw=g.w,gh=Math.max(g.h,h);
			const prvCanv=gId('animPrv');
			const scale=Math.max(1,Math.floor(200/Math.max(gw,gh)));
			prvCanv.width=gw*scale;
			// stretch 1D previews to a visible height (40 px desktop / 50 px touch)
			prvCanv.height=is1D?Math.max(gh*scale,('ontouchstart' in window || navigator.maxTouchPoints > 0)?50:40):gh*scale;
			const ms=animFrames.reduce((s,f)=>s+f.delay,0);
			gId('animInfo').textContent=`${animFrames.length} frames \u00b7 ${(ms/1000).toFixed(2)}s`;
			stopAnimPreview();
			const pCtx=prvCanv.getContext('2d');pCtx.imageSmoothingEnabled=false;
			const tmp=cE('canvas');tmp.width=gw;tmp.height=gh;
			const tctx=tmp.getContext('2d');
			let idx=0,dir=1;
			function tick(){
				if(!animFrames.length)return;
				const frm=animFrames[idx];
				const imgData=tctx.createImageData(gw,gh);
				for(let i=0;i<gw*gh;i++){const s=(i<w*h?i:w*h-1)*4;imgData.data[i*4]=frm.pixels[s];imgData.data[i*4+1]=frm.pixels[s+1];imgData.data[i*4+2]=frm.pixels[s+2];imgData.data[i*4+3]=255;}
				tctx.putImageData(imgData,0,0);pCtx.drawImage(tmp,0,0,prvCanv.width,prvCanv.height);
				animPrvTimer=setTimeout(tick,frm.delay);
				if(pingPong&&animFrames.length>1){idx+=dir;if(idx>=animFrames.length-1||idx<=0)dir=-dir;}
				else{idx=(idx+1)%animFrames.length;}
			}
			tick();
		}

		function stopAnimPreview(){clearTimeout(animPrvTimer);animPrvTimer=null;}

		function clearAnim(){
			if(!confirm('Clear animation frames?'))return;
			if(isRecording) {
				clearInterval(recIntervalId);
				recIntervalId=null;
				isRecording=false;
				gId('recBtn').textContent='● Record';
				gId('recBtn').classList.remove('recording');
			}
			animFrames=[];
			lastAnimBlob=null;
			selFrameIdx=-1;
			stopAnimPreview();
			gId('animPrvArea').style.display='none';
			gId('animClrArea').style.display='none';
			updateSMFrameList();
			drawAll();
			updButtons();
		}

		// update button visibility
		function updButtons(){
			const isAnimation = animFrames.length > 0; // multiple frames
			// without gif support (esp8266, or omggif failed to load on esp32) only the preset option makes sense
			gId('savePreset').style.display = isAnimation ? 'none' : ''; // can not save an animation as a preset
			gId('animClrArea').style.display = isAnimation ? '' : 'none';
			gId('applyAllBtn').disabled = !isAnimation;
			gId('saveGIF').style.display   =  is8266 ? 'none' : ''; // hide gif button on ESP8266
		}

		// builds the animated gif using the same bounding-box differential encoding as saveGIF's palette logic (median-cut genPal),
		// plus per-frame delay: identical consecutive frames are merged (delay accumulated) rather than stored twice
		function loadSMFrame(i){
			if(i<0||i>=animFrames.length)return;
			selFrameIdx=i;
			const p=animFrames[i].pixels;
			for(let j=0;j<w*h;j++){matrix[j]={r:p[j*4],g:p[j*4+1],b:p[j*4+2]};}
			drawAll();
			updateSMFrameList();
			gId('updBtn').disabled=false;
			gId('insBtn').disabled=false;
		}

		function updateSMFrame(all = false) {
			const dur = Math.max(10, parseInt(gId('smDur').value) || 200);
			// update all, only updates the frame duration
			if (all) {
				if (!animFrames.length) return;
				animFrames.forEach(f => f.delay = dur);
				toast(`Set ${dur}ms for all ${animFrames.length} frames`);
			} else {
				if (selFrameIdx < 0) return;
				animFrames[selFrameIdx].pixels = captureMatrix();
				animFrames[selFrameIdx].delay = dur;
			}
			lastAnimBlob = null;
			updateSMFrameList();
			showAnimPreview();
	}

		function insertSMFrame(){
			if(selFrameIdx<0)return;
			const dur=Math.max(10,parseInt(gId('smDur').value)||200);
			animFrames.splice(selFrameIdx,0,{pixels:captureMatrix(),delay:dur});
			lastAnimBlob=null;
			updateSMFrameList();
			showAnimPreview();
			updButtons();
		}

		function buildAnimGif(){
			if(!animFrames.length){toast('No frames',true);return null;}
			// If ping-pong is enabled, create a reversed copy of frames (excluding last to avoid duplicate)
			let exportFrames=animFrames;
			if(pingPong&&animFrames.length>1){
				exportFrames=animFrames.concat(animFrames.slice(0,-1).reverse());
			}
			const g=grid(w),gw=g.w,gh=Math.max(g.h,h),ppf=gw*gh;
			const all=new Uint8Array(exportFrames.length*ppf*4);
			exportFrames.forEach((frm,fi)=>{
				const off=fi*ppf*4;
				for(let i=0;i<ppf;i++){const s=(i<w*h?i:w*h-1)*4;all[off+i*4]=frm.pixels[s];all[off+i*4+1]=frm.pixels[s+1];all[off+i*4+2]=frm.pixels[s+2];all[off+i*4+3]=255;}
			});
			const{indexed,palette}=genPal(all);
			const fidx=exportFrames.map((_,fi)=>indexed.subarray(fi*ppf,(fi+1)*ppf));

			// merge consecutive identical indexed frames by accumulating delay (gif delay is per-frame, no need for dummy frames)
			const merged=[{idx:fidx[0],delay:exportFrames[0].delay}];
			for(let i=1;i<fidx.length;i++){
				let same=true;
				for(let j=0;j<ppf&&same;j++)same=fidx[i][j]===fidx[i-1][j];
				if(same)merged[merged.length-1].delay+=exportFrames[i].delay;
				else merged.push({idx:fidx[i],delay:exportFrames[i].delay});
			}

			const gd=[],wr=new window.GifWriter(gd,gw,gh,{palette,loop:0});
			wr.addFrame(0,0,gw,gh,merged[0].idx,{delay:Math.max(1,Math.round(merged[0].delay/10)),disposal:1});
			for(let i=1;i<merged.length;i++){
				const curr=merged[i].idx,prev=merged[i-1].idx;
				let x0=gw,y0=gh,x1=0,y1=0;
				for(let y=0;y<gh;y++)for(let x=0;x<gw;x++)if(curr[y*gw+x]!==prev[y*gw+x]){if(x<x0)x0=x;if(x>x1)x1=x;if(y<y0)y0=y;if(y>y1)y1=y;}
				const fw=x1-x0+1,fh=y1-y0+1,region=new Uint8Array(fw*fh);
				for(let y=0;y<fh;y++)for(let x=0;x<fw;x++)region[y*fw+x]=curr[(y0+y)*gw+(x0+x)];
				wr.addFrame(x0,y0,fw,fh,region,{delay:Math.max(1,Math.round(merged[i].delay/10)),disposal:1});
			}
			wr.end();
			return new Blob([new Uint8Array(gd)],{type:'image/gif'});
		}

		function getAnimBlob() {
			if(!lastAnimBlob) lastAnimBlob=buildAnimGif();
			return lastAnimBlob;
		}

		// note: deliberately not using showToast() from common.js to keep it independent from future upstream changes, it also requires almost the same amount of code in CSS
		function toast(message,e=false) {
			const toast = document.createElement('div');
			Object.assign(toast.style, {
				position: 'fixed', bottom: '20px', right: '20px',
				background: e?'#e00':'#555', color: '#fff', padding: '10px 20px',
				borderRadius: '10px', fontSize: '14px', zIndex: '1000'
			});
			toast.textContent = message;
			document.body.appendChild(toast);
			setTimeout(() => toast.remove(), 5000);
		}
	</script>
